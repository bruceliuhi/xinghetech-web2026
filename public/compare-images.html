<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Optimization Comparison</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            mx-auto;
        }

        .comparison-row {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .image-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        h3 {
            margin-top: 0;
            color: #1f2937;
        }

        .meta {
            margin-top: 10px;
            color: #4b5563;
            font-size: 0.9em;
            font-weight: bold;
        }

        .saving {
            color: #059669;
            font-weight: bold;
            margin-top: 4px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Image Quality Comparison</h1>
        <p>Left: Original (PNG) | Right: Optimized (WebP)</p>

        <!-- Shouye Agent BG -->
        <div class="comparison-row">
            <div class="image-col">
                <h3>Original</h3>
                <img src="/images/shouye-agent-bg.png" alt="Original">
                <div class="meta">Size: 10.89 MB</div>
            </div>
            <div class="image-col">
                <h3>Optimized (WebP)</h3>
                <img src="/images/shouye-agent-bg.webp" alt="WebP">
                <div class="meta">Size: 17 KB</div>
                <div class="saving">Saved 99.8%</div>
            </div>
        </div>

        <!-- Agent Management -->
        <div class="comparison-row">
            <div class="image-col">
                <h3>Original</h3>
                <img src="/images/agent-management.png" alt="Original">
                <div class="meta">Size: 3.37 MB</div>
            </div>
            <div class="image-col">
                <h3>Optimized (WebP)</h3>
                <img src="/images/agent-management.webp" alt="WebP">
                <div class="meta">Size: 103 KB</div>
                <div class="saving">Saved 97%</div>
            </div>
        </div>

        <!-- Changjing -->
        <div class="comparison-row">
            <div class="image-col">
                <h3>Original</h3>
                <img src="/images/changjing.png" alt="Original">
                <div class="meta">Size: 2.35 MB</div>
            </div>
            <div class="image-col">
                <h3>Optimized (WebP)</h3>
                <img src="/images/changjing.webp" alt="WebP">
                <div class="meta">Size: 27 KB</div>
                <div class="saving">Saved 98%</div>
            </div>
        </div>

    </div>
</body>

</html>
