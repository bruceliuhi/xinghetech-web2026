<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F9FE;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8F9FE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2C4BFF;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#9122FA;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  
  <!-- 网格图案 -->
  <g opacity="0.3">
    <!-- 垂直线 -->
    <line x1="0" y1="0" x2="0" y2="1080" stroke="#2C4BFF" stroke-width="1" opacity="0.1"/>
    <line x1="240" y1="0" x2="240" y2="1080" stroke="#2C4BFF" stroke-width="1" opacity="0.1"/>
    <line x1="480" y1="0" x2="480" y2="1080" stroke="#2C4BFF" stroke-width="1" opacity="0.1"/>
    <line x1="720" y1="0" x2="720" y2="1080" stroke="#2C4BFF" stroke-width="1" opacity="0.1"/>
    <line x1="960" y1="0" x2="960" y2="1080" stroke="#2C4BFF" stroke-width="1" opacity="0.1"/>
    <line x1="1200" y1="0" x2="1200" y2="1080" stroke="#2C4BFF" stroke-width="1" opacity="0.1"/>
    <line x1="1440" y1="0" x2="1440" y2="1080" stroke="#2C4BFF" stroke-width="1" opacity="0.1"/>
    <line x1="1680" y1="0" x2="1680" y2="1080" stroke="#2C4BFF" stroke-width="1" opacity="0.1"/>
    <line x1="1920" y1="0" x2="1920" y2="1080" stroke="#2C4BFF" stroke-width="1" opacity="0.1"/>
    
    <!-- 水平线 -->
    <line x1="0" y1="0" x2="1920" y2="0" stroke="#2C4BFF" stroke-width="1" opacity="0.1"/>
    <line x1="0" y1="135" x2="1920" y2="135" stroke="#2C4BFF" stroke-width="1" opacity="0.1"/>
    <line x1="0" y1="270" x2="1920" y2="270" stroke="#2C4BFF" stroke-width="1" opacity="0.1"/>
    <line x1="0" y1="405" x2="1920" y2="405" stroke="#2C4BFF" stroke-width="1" opacity="0.1"/>
    <line x1="0" y1="540" x2="1920" y2="540" stroke="#2C4BFF" stroke-width="1" opacity="0.1"/>
    <line x1="0" y1="675" x2="1920" y2="675" stroke="#2C4BFF" stroke-width="1" opacity="0.1"/>
    <line x1="0" y1="810" x2="1920" y2="810" stroke="#2C4BFF" stroke-width="1" opacity="0.1"/>
    <line x1="0" y1="945" x2="1920" y2="945" stroke="#2C4BFF" stroke-width="1" opacity="0.1"/>
    <line x1="0" y1="1080" x2="1920" y2="1080" stroke="#2C4BFF" stroke-width="1" opacity="0.1"/>
  </g>
  
  <!-- 装饰性圆点 -->
  <g opacity="0.2">
    <circle cx="480" cy="270" r="4" fill="#2C4BFF"/>
    <circle cx="960" cy="540" r="6" fill="#9122FA"/>
    <circle cx="1440" cy="810" r="4" fill="#2C4BFF"/>
    <circle cx="720" cy="405" r="3" fill="#9122FA"/>
    <circle cx="1200" cy="675" r="5" fill="#2C4BFF"/>
  </g>
  
  <!-- 渐变装饰 -->
  <rect x="0" y="0" width="1920" height="300" fill="url(#accentGradient)"/>
  <rect x="0" y="780" width="1920" height="300" fill="url(#accentGradient)"/>
</svg>
